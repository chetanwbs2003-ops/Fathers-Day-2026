<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(135deg,#fdf6f0,#ffe4e1);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* container */
.container {
  text-align: center;
  width: 90%;
  max-width: 900px;
}

/* envelope */
.envelope {
  font-size: 90px;
  transition: all 1s ease;
}

.envelope.open {
  transform: translateY(-80px) scale(0.7);
  opacity: 0;
}

/* button */
button {
  padding: 15px 35px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #d62828;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

button:hover {
  transform: scale(1.05);
}

/* letter */
.letter {
  display: none;
  margin-top: 25px;
  padding: 40px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.2);
  text-align: left;
  line-height: 1.8;
  font-size: 18px;
  white-space: pre-wrap;
  animation: fadeIn 1.5s ease;
}

/* fade animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.heart {
  position: fixed;
  top: -20px;
  color: red;
  font-size: 20px;
  animation: fall 5s linear forwards;
  pointer-events: none;
  z-index: 9999;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* warning overlay */
#warning {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 20px;
  padding: 30px;
  z-index: 999;
  cursor: pointer;
}

/* ─── NEW: extra images below the letter ─── */
.extra-images {
  display: none; /* hidden until letter appears */
  margin-top: 30px;
  padding: 10px;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
  animation: fadeIn 1.5s ease;
}

.extra-images img {
  max-width: 180px;
  height: auto;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: transform 0.3s;
  object-fit: cover;
  width: 100%;
}

.extra-images img:hover {
  transform: scale(1.05);
}

/* responsive */
@media (max-width: 600px) {
  .extra-images img {
    max-width: 130px;
  }
}
@media (max-width: 400px) {
  .extra-images img {
    max-width: 100px;
  }
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" src="Songs.mp3.mov" preload="auto"></audio>

<!-- WARNING SCREEN -->
<div id="warning">
  🔊 This page contains background music<br><br>
  Tap anywhere to continue
</div>

<div class="container">

  <div class="envelope" id="envelope">💌</div>

  <h1>Happy Father's Day, Pa</h1>

  <button onclick="openLetter()">Click to Open</button>
  <div class ="button-images">
    <p>
    <img src="Images/IMG4.jpg" alt="IMG5" style="margin-top: 10px; max-width: 35%; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);"></p>
    <p>
    <img src ="Images/IMG1.png" alt="Family Photo" style="margin-top: 20px; max-width: 40%; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
  
    <img src="Images/IMG2.jpg" alt="IMG2" style="margin-top: 20px; max-width: 53%; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);" >
    </p>
  </div>
  <div class="letter" id="letter"></div>

  <!-- ─── NEW: images below the letter (IMG2–IMG5) ─── -->
  <div class="extra-images" id="extraImages">

    <!-- IMG3
    <div class="img-block">
      <img src="Images/IMG3.jpg" alt="IMG3" style="height: 500px;">
    </div> -->

    <!-- IMG4 -->
    <div class="img-block">
      <img src="Images/IMG5.jpg" alt="IMG4" style="width: 700px; height: 300px;">
    </div>

    <!-- IMG5 -->
    <div class="img-block">
      <img src="Images/IMG3.jpg" alt="IMG5" style="width: 500px; height: 300px;">
    </div>

</div>

<script>

/* =========================
   WARNING CLICK → START MUSIC
========================= */
document.getElementById("warning").addEventListener("click", function () {
  this.style.display = "none";

  const music = document.getElementById("bgMusic");

  // safe browser play
  music.play().catch(() => {});

  // fade in volume
  music.volume = 0;
  let v = 0;
  const fade = setInterval(() => {
    if (v < 1) {
      v += 0.05;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  }, 150);
});

/* =========================
   LETTER TEXT (PRESERVES SPACING)
========================= */
const message = `Dear Pa,

Happy Father's Day!

Since childhood, you have always supported and guided us in every step of our lives. Thank you for being our strength and for constantly motivating us to become better versions of ourselves.

From teaching us mathematical tables to showing us how to study effectively and approach life with discipline, we now realise how valuable those lessons were in helping us grow from children into adults. Thank you for always correcting us when we went wrong and guiding us toward the right path with patience and love.

Thank you for always correcting us when we were wrong, even when we did not want to hear it at the time. Thank you for patiently guiding us back to the right path and for believing in our potential, even during moments when we doubted ourselves.

You have always been our shield during difficult times, our source of motivation when we felt discouraged, and our biggest cheerleader through every achievement, no matter how small. You have carried responsibilities silently, made sacrifices without expecting recognition, and continued to check on us, support us, and stand beside us no matter how busy or challenging life became.

Thank you, Mi and Pa, for raising us with so much love, patience, and dedication. Thank you for giving us opportunities, values, and a home filled with warmth and encouragement. Truly, you raised us to become more than we ever thought we could be. Whatever we achieve in life will always have your teachings, sacrifices, and unconditional love at its foundation.

We are incredibly fortunate and grateful to have parents like you. To us, you both are the best parents in the world, and we can never thank you enough for everything you have done and continue to do for us.

We love you very much.

With Love,
KMT`;

/* =========================
   TYPEWRITER WITH INDENTATION
========================= */
let i = 0;

function typeWriter() {
  const letter = document.getElementById("letter");

  if (i === 0) {
    letter.style.display = "block";
    // also show the extra images
    document.getElementById("extraImages").style.display = "flex";
  }

  if (i < message.length) {
    letter.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

/* =========================
   HEARTS
========================= */
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

/* =========================
   OPEN LETTER
========================= */
function openLetter() {

  document.querySelector("button").style.display = "none";

  const envelope = document.getElementById("envelope");
  envelope.classList.add("open");

  typeWriter();
  startHearts();
}

</script>

</body>
</html>
